networks:
  obs_net:
    driver: bridge

volumes:
  os_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=false
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - os_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - obs_net
    restart: unless-stopped

  opensearch_dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: opensearch_dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
    depends_on:
      - opensearch
    ports:
      - "5601:5601"
    networks:
      - obs_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
    volumes:
      - ${OBS_ROOT:-/volume1/docker/home-observability}/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${OBS_ROOT:-/volume1/docker/home-observability}/config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - obs_net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ${OBS_ROOT:-/volume1/docker/home-observability}/config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - obs_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    depends_on:
      - prometheus
      - opensearch
    volumes:
      - grafana_data:/var/lib/grafana
      - ${OBS_ROOT:-/volume1/docker/home-observability}/config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - obs_net
    restart: unless-stopped

  vector:
    image: timberio/vector:0.42.0-debian
    container_name: vector
    volumes:
      - ${OBS_ROOT:-/volume1/docker/home-observability}/config/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "1514:1514/udp"
      - "1514:1514/tcp"
    depends_on:
      - opensearch
    networks:
      - obs_net
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - obs_net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "${CADVISOR_HOST_PORT:-18080}:8080"
    networks:
      - obs_net
    restart: unless-stopped

  snmp_exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp_exporter
    volumes:
      - ${OBS_ROOT:-/volume1/docker/home-observability}/config/snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    networks:
      - obs_net
    restart: unless-stopped

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox_exporter
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ${OBS_ROOT:-/volume1/docker/home-observability}/config/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks:
      - obs_net
    restart: unless-stopped

  pihole_exporter_primary:
    image: ekofr/pihole-exporter:latest
    container_name: pihole_exporter_primary
    environment:
      - PIHOLE_HOSTNAME=${PIHOLE1_HOST}
      - PIHOLE_PASSWORD=${PIHOLE1_PASSWORD}
      - PORT=9617
      - INTERVAL=30s
    ports:
      - "9617:9617"
    networks:
      - obs_net
    restart: unless-stopped

  pihole_exporter_secondary:
    image: ekofr/pihole-exporter:latest
    container_name: pihole_exporter_secondary
    environment:
      - PIHOLE_HOSTNAME=${PIHOLE2_HOST}
      - PIHOLE_PASSWORD=${PIHOLE2_PASSWORD}
      - PORT=9618
      - INTERVAL=30s
    ports:
      - "9618:9618"
    networks:
      - obs_net
    restart: unless-stopped
