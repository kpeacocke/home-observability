global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: pihole_primary
    static_configs:
      - targets: ["pihole_exporter_primary:9617"]

  - job_name: pihole_secondary
    static_configs:
      - targets: ["pihole_exporter_secondary:9618"]

  - job_name: snmp_draytek
    metrics_path: /snmp
    params:
      module: [if_mib]
      # Replace with your DrayTek management IP.
      target: ["192.168.1.1"]
    static_configs:
      - targets: ["snmp_exporter:9116"]

  - job_name: synology_snmp
    metrics_path: /snmp
    params:
      module: [if_mib]
      # Replace with your Synology NAS management IP.
      target: ["192.168.1.2"]
    static_configs:
      - targets: ["snmp_exporter:9116"]

  - job_name: blackbox_icmp
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      # Replace device IPs to match your network.
      - targets: ["1.1.1.1", "8.8.8.8", "192.168.1.1", "192.168.1.10"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115

  - job_name: blackbox_dns
    metrics_path: /probe
    params:
      module: [dns_udp]
    static_configs:
      # Replace with your primary Pi-hole IP.
      - targets: ["192.168.1.10:53"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115
